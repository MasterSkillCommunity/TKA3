<body class="bg-[#f0f2f5] dark:bg-[#000000] text-gray-900 dark:text-white min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="w-full max-w-[400px] text-center">
        
        <!-- profile picture : Akash Bhai image -->
        <div class="mx-auto w-28 h-28 mb-6 relative">
            <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
            <img src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69ae98fe07edc_photo_2026-03-09_15-25-02.jpg" 
                 class="relative w-full h-full rounded-full object-cover border-4 border-white dark:border-[#1c1c1e] shadow-xl"
                 alt="Akash Bhai profile">
            <div class="absolute bottom-2 right-1 bg-white dark:bg-black rounded-full p-1">
                <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>

        <!-- name : Akash Bhai -->
        <h1 class="text-3xl font-black mb-2 tracking-tight leading-none">
            Akash Bhai        </h1>
        <p class="text-gray-500 dark:text-gray-400 font-medium mb-6">
            Join now for exclusive insights and daily tips.        </p>

        <!-- AUTO-REDIRECT TIMER DISPLAY -->
        <div class="mb-4 text-sm font-mono bg-gray-200 dark:bg-gray-800 py-2 px-3 rounded-full inline-flex items-center gap-2 mx-auto">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>Auto‑redirect in <span id="timer" class="font-bold text-blue-600 dark:text-blue-400">20</span>s</span>
        </div>

        <!-- REDIRECT BUTTON: now points to the Telegram link -->
        <a href="https://t.me/+hXZH97Hny7QxY2Jl" id="joinBtn" 
           class="block w-full bg-[#0088cc] hover:bg-[#007ab8] text-white font-bold text-lg py-5 rounded-2xl shadow-xl shadow-blue-500/20 transition-all transform hover:scale-[1.02] active:scale-95 relative overflow-hidden">
            <span id="btnText">JOIN CHANNEL</span>
            <span id="btnLoad" class="hidden absolute inset-0 flex items-center justify-center bg-[#007ab8]">
                <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </span>
        </a>

        <div class="mt-8 flex justify-center gap-6 text-xs font-semibold text-gray-400 dark:text-gray-600 uppercase tracking-widest">
            <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> Encrypted</span>
            <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Verified</span>
        </div>

    </div>

    <script>
        (function() {
            const button = document.getElementById('joinBtn');
            const btnText = document.getElementById('btnText');
            const btnLoad = document.getElementById('btnLoad');
            
            // Telegram channel link
            const channelUrl = 'https://t.me/+hXZH97Hny7QxY2Jl';
            
            // Timer variables
            let secondsLeft = 20;
            const timerSpan = document.getElementById('timer');
            
            // 1. Auto-redirect countdown
            const countdown = setInterval(function() {
                secondsLeft--;
                if (timerSpan) timerSpan.textContent = secondsLeft;
                
                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    // Trigger redirect with loading state
                    performRedirect(channelUrl);
                }
            }, 1000);
            
            // 2. Manual click handler (same as before, but uses channelUrl)
            button.addEventListener('click', function(e) {
                e.preventDefault();               // stop immediate navigation
                
                // Clear countdown to avoid double redirect
                clearInterval(countdown);
                
                // Trigger redirect with loading UI
                performRedirect(channelUrl);
            });
            
            // 3. Shared redirect function (shows spinner, then redirects)
            function performRedirect(url) {
                // Show loading state
                btnText.classList.add('opacity-0');
                btnLoad.classList.remove('hidden');
                
                // Optional Facebook Pixel
                if (typeof fbq === 'function') { 
                    fbq('track', 'InitiateCheckout'); 
                }
                
                // Slight delay so spinner is visible, then redirect
                setTimeout(function() { 
                    window.location.href = url; 
                }, 200);
            }
        })();
    </script>
